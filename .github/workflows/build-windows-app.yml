name: Build Windows App Artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows desktop app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Rebuild Electron native modules
        run: npm run rebuild:native

      - name: Run tests
        run: npm test

      - name: Package Windows app
        run: npm run package:win -w apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-ai-assistant-windows
          path: apps/desktop/release/**
          if-no-files-found: error
          retention-days: 7
